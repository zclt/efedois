<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FII Monitor</title>
  <style>
    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface-2:   #21262d;
      --border:      #30363d;
      --text:        #e6edf3;
      --muted:       #8b949e;
      --accent:      #58a6ff;
      --green:       #3fb950;
      --green-dim:   rgba(63,185,80,0.12);
      --yellow:      #d29922;
      --yellow-dim:  rgba(210,153,34,0.12);
      --red:         #f85149;
      --red-dim:     rgba(248,81,73,0.12);
      --radius:      8px;
    }

    html.light {
      --bg:          #ffffff;
      --surface:     #f6f8fa;
      --surface-2:   #eaeef2;
      --border:      #d0d7de;
      --text:        #1f2328;
      --muted:       #656d76;
      --accent:      #0969da;
      --green:       #1a7f37;
      --green-dim:   rgba(26,127,55,0.12);
      --yellow:      #9a6700;
      --yellow-dim:  rgba(154,103,0,0.12);
      --red:         #d1242f;
      --red-dim:     rgba(209,36,47,0.12);
    }

    html { font-size: 90%; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    .portfolio-total-badge {
      display: none;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--green);
      background: var(--green-dim);
      border: 1px solid rgba(63,185,80,0.3);
      border-radius: 4px;
      padding: 2px 7px;
      white-space: nowrap;
      width: fit-content;
    }

    .portfolio-total-badge.visible { display: block; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .field-fiis { flex: 1; min-width: 240px; }

    input[type="text"], select {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 7px 10px;
      font-size: 0.875rem;
      width: 100%;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: var(--radius);
      padding: 8px 18px;
      font-size: 0.875rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
      align-self: flex-end;
    }

    .btn:hover  { opacity: 0.85; }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .status-bar {
      margin-top: 10px;
      display: flex;
      gap: 20px;
      font-size: 0.75rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    #countdown { font-variant-numeric: tabular-nums; }

    /* ── Grid ───────────────────────────────────────── */
    main {
      padding: 20px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* ── Card ───────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent)20; }

    .card-updating { opacity: 0.6; pointer-events: none; }

    .card[draggable="true"] { cursor: grab; }
    .card.dragging { opacity: 0.4; cursor: grabbing; }
    .card.drag-over { outline: 2px dashed var(--accent); outline-offset: 2px; }

    /* card header */
    .c-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .c-ticker { font-size: 1.1rem; font-weight: 700; color: var(--accent); text-decoration: none; }
    .c-ticker:hover { text-decoration: underline; }
    .c-nome   { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

    .c-badge {
      font-size: 0.68rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      color: var(--muted);
      white-space: nowrap;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .c-refreshing-tag {
      font-size: 0.65rem;
      color: var(--accent);
      opacity: 0.7;
      margin-top: 3px;
    }

    /* price block */
    .c-price {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .c-price-val {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .c-price-cur { font-size: 0.9rem; color: var(--muted); margin-right: 2px; }

    .c-var {
      font-size: 0.9rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .up   { color: var(--green); background: var(--green-dim); }
    .down { color: var(--red);   background: var(--red-dim); }
    .flat { color: var(--muted); }

    /* metrics */
    .c-metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .c-metric {
      padding: 10px 12px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .c-metric:nth-child(2n) { border-right: none; }
    .c-metric:nth-last-child(-n+2) { border-bottom: none; }

    .c-metric-lbl {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .c-metric-val {
      font-size: 1rem;
      font-weight: 600;
      margin-top: 3px;
    }

    /* history */
    .c-hist {
      padding: 10px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex: 1;
    }

    .c-hist-title {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .c-hist-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    .c-hist-row:first-of-type { border-top: none; }

    .c-hist-time  { color: var(--muted); font-size: 0.72rem; min-width: 42px; }
    .c-hist-price { font-weight: 600; }
    .c-hist-var   { font-size: 0.75rem; text-align: right; min-width: 70px; }

    .c-hist-cur-label {
      font-size: 0.65rem;
      background: var(--accent);
      color: #0d1117;
      border-radius: 3px;
      padding: 1px 5px;
      font-weight: 700;
      margin-left: 6px;
    }

    .c-no-hist { font-size: 0.78rem; color: var(--muted); font-style: italic; }

    /* signal */
    .c-signal { padding: 12px 16px; }

    .c-signal-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: var(--radius);
      margin-bottom: 8px;
    }

    .c-signal-label { font-weight: 700; font-size: 0.875rem; }

    .c-signal-reasons {
      list-style: none;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .c-signal-reasons li { padding: 1px 0; }
    .c-signal-reasons li::before { content: '› '; color: var(--border); }

    /* loading / error */
    .c-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      gap: 12px;
      color: var(--muted);
      font-size: 0.875rem;
      flex: 1;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .c-error-icon { font-size: 1.5rem; }

    /* empty state */
    .empty {
      grid-column: 1/-1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 10px;
      color: var(--muted);
    }

    .empty h2 { font-size: 1.1rem; color: var(--text); }
    .empty p  { font-size: 0.875rem; }

    /* footer */
    footer {
      text-align: center;
      padding: 14px;
      color: var(--muted);
      font-size: 0.72rem;
      border-top: 1px solid var(--border);
    }

    /* ── Portfolio ───────────────────────────────────────── */
    .c-portfolio {
      cursor: pointer;
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: background 0.15s;
      user-select: none;
    }
    .c-portfolio:hover { background: var(--surface-2); }
    .c-portfolio-info { flex: 1; min-width: 0; }
    .c-portfolio-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .c-portfolio-row {
      display: flex;
      gap: 8px;
      align-items: baseline;
      flex-wrap: wrap;
      font-size: 0.82rem;
    }
    .c-portfolio-cotas { font-weight: 700; }
    .c-portfolio-est   { color: var(--green); font-weight: 600; }
    .c-portfolio-pgto  { color: var(--muted); font-size: 0.75rem; }
    .c-portfolio-empty { font-size: 0.8rem; color: var(--muted); font-style: italic; }
    .c-portfolio-pen   { font-size: 0.8rem; color: var(--muted); opacity: 0.45; flex-shrink: 0; }

    /* ── Popup ───────────────────────────────────────────── */
    .popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .popup-overlay.open { display: flex; }
    .popup {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 340px;
      margin: 0 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .popup-head { margin-bottom: 20px; }
    .popup-ticker { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .popup-nome   { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .popup-field  { margin-bottom: 16px; }
    .popup-field label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .popup-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 1.5rem;
      font-weight: 700;
      width: 100%;
      text-align: center;
      letter-spacing: 2px;
    }
    .popup-input:focus { outline: none; border-color: var(--accent); }
    .popup-input::-webkit-outer-spin-button,
    .popup-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .popup-input { -moz-appearance: textfield; }
    .popup-preview {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 20px;
    }
    .popup-preview-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 0.82rem;
    }
    .popup-preview-lbl   { color: var(--muted); }
    .popup-preview-val   { font-weight: 600; }
    .popup-preview-total { color: var(--green); font-size: 1rem; }
    .popup-actions { display: flex; gap: 8px; }
    .popup-actions .btn { flex: 1; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface-2); opacity: 1; }

    .zoom-controls {
      display: flex;
      align-items: flex-end;
      gap: 4px;
    }
    .btn-zoom {
      background: var(--surface-2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      line-height: 1;
    }
    .btn-zoom:hover { background: var(--border); color: var(--text); }
    .btn-zoom:disabled { opacity: 0.35; cursor: not-allowed; }
    .zoom-label {
      font-size: 0.68rem;
      color: var(--muted);
      min-width: 34px;
      text-align: center;
      align-self: center;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="brand-wrap">
      <div class="brand">📊 FII Monitor</div>
      <div class="portfolio-total-badge" id="portfolio-total-badge"></div>
    </div>

    <div class="field field-fiis">
      <label for="inp-fiis">FIIs monitorados (separados por vírgula)</label>
      <input type="text" id="inp-fiis" placeholder="MXRF11, HGLG11, XPLG11">
    </div>

    <div class="field">
      <label for="inp-interval">Intervalo</label>
      <select id="inp-interval">
        <option value="30">30 s</option>
        <option value="60" selected>1 min</option>
        <option value="120">2 min</option>
        <option value="300">5 min</option>
        <option value="600">10 min</option>
      </select>
    </div>

    <div class="zoom-controls">
      <button class="btn-zoom" id="btn-zoom-out" title="Diminuir">A−</button>
      <span class="zoom-label" id="zoom-label">100%</span>
      <button class="btn-zoom" id="btn-zoom-in" title="Aumentar">A+</button>
    </div>

    <button class="btn-zoom" id="btn-theme" title="Alternar tema">🌙</button>

    <button class="btn" id="btn-refresh">⟳ Atualizar</button>
  </div>

  <div class="status-bar">
    <span id="last-updated">Aguardando primeira consulta…</span>
    <span id="countdown"></span>
  </div>
</header>

<main id="grid"></main>

<footer>
  Dados: Status Invest &nbsp;·&nbsp; Não constitui recomendação de investimento
</footer>

<div class="popup-overlay" id="popup-overlay">
  <div class="popup">
    <div class="popup-head">
      <div class="popup-ticker" id="popup-ticker"></div>
      <div class="popup-nome"   id="popup-nome"></div>
    </div>
    <div class="popup-field">
      <label for="popup-input">Cotas na carteira (0 – 9.999)</label>
      <input type="number" class="popup-input" id="popup-input"
             min="0" max="9999" step="1" inputmode="numeric">
    </div>
    <div class="popup-preview" id="popup-preview"></div>
    <div class="popup-actions">
      <button class="btn btn-ghost" id="popup-cancel">Cancelar</button>
      <button class="btn"           id="popup-save">Salvar</button>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const MAX_HIST  = 10;
const HIST_SHOW = 3;

// ── Zoom ───────────────────────────────────────────────────────────────────
const ZOOM_MIN  = 50;
const ZOOM_MAX  = 130;
const ZOOM_STEP = 10;

let zoomPct = parseInt(localStorage.getItem('cardZoom') || '100', 10);

function applyZoom() {
  document.getElementById('grid').style.zoom = zoomPct + '%';
  document.getElementById('zoom-label').textContent = zoomPct + '%';
  document.getElementById('btn-zoom-out').disabled = zoomPct <= ZOOM_MIN;
  document.getElementById('btn-zoom-in').disabled  = zoomPct >= ZOOM_MAX;
  localStorage.setItem('cardZoom', zoomPct);
}

document.getElementById('btn-zoom-out').addEventListener('click', () => {
  if (zoomPct > ZOOM_MIN) { zoomPct -= ZOOM_STEP; applyZoom(); }
});
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  if (zoomPct < ZOOM_MAX) { zoomPct += ZOOM_STEP; applyZoom(); }
});

applyZoom();

// ── Theme ──────────────────────────────────────────────────────────────────
let theme = localStorage.getItem('theme') || 'dark';

function applyTheme() {
  document.documentElement.classList.toggle('light', theme === 'light');
  document.getElementById('btn-theme').textContent = theme === 'dark' ? '🌙' : '☀️';
}

document.getElementById('btn-theme').addEventListener('click', () => {
  theme = theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', theme);
  applyTheme();
});

applyTheme();

// ── State ──────────────────────────────────────────────────────────────────
let cfg        = { fiis: ['MXRF11', 'HGLG11'], intervalSec: 60 };
let history    = {};   // { TICKER: FIIData[] }  newest first
let cardState  = {};   // { TICKER: 'idle'|'loading'|'error'|FIIData }
let refreshing = new Set();
let timerId    = null;
let countdown  = 0;

// ── Storage ────────────────────────────────────────────────────────────────
async function loadCfg() {
  try {
    const res = await fetch('/api/config');
    if (res.ok) Object.assign(cfg, await res.json());
  } catch {}
}
function saveCfg() {
  fetch('/api/config', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(cfg),
  }).catch(() => {});
}
async function loadHistory() {
  try {
    const res = await fetch('/api/history');
    if (res.ok) history = await res.json();
  } catch {}
}
function pushHistory(ticker, data) {
  if (!history[ticker]) history[ticker] = [];
  history[ticker].unshift(data);
  history[ticker] = history[ticker].slice(0, MAX_HIST);
  fetch(`/api/history/${ticker}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  }).catch(() => {});
}

// ── Helpers ────────────────────────────────────────────────────────────────
const parseBR = v => parseFloat((v || '0').replace(',', '.')) || 0;

function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function varClass(v) {
  const n = parseBR(v);
  return n > 0 ? 'up' : n < 0 ? 'down' : 'flat';
}

function varIcon(v) {
  const n = parseBR(v);
  return n > 0 ? '▲' : n < 0 ? '▼' : '→';
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Signal ─────────────────────────────────────────────────────────────────
function calcSignal(data, hist) {
  const pvp   = parseBR(data.pvp);
  const dy    = parseBR(data.dy_12m);
  const preco = parseBR(data.preco_atual);

  let score = 0;
  const reasons = [];

  // P/VP
  if (pvp > 0) {
    if      (pvp < 0.85)  { score += 3; reasons.push(`P/VP ${data.pvp} — muito abaixo do VPA`); }
    else if (pvp < 0.95)  { score += 2; reasons.push(`P/VP ${data.pvp} — abaixo do VPA`); }
    else if (pvp <= 1.05) { score += 1; reasons.push(`P/VP ${data.pvp} — próximo ao VPA`); }
    else if (pvp >  1.15) { score -= 1; reasons.push(`P/VP ${data.pvp} — acima do VPA`); }
  }

  // DY
  if (dy > 0) {
    if      (dy >= 12) { score += 2; reasons.push(`DY ${data.dy_12m}% — rendimento excelente`); }
    else if (dy >=  9) { score += 1; reasons.push(`DY ${data.dy_12m}% — rendimento bom`); }
    else if (dy <   6) { score -= 1; reasons.push(`DY ${data.dy_12m}% — rendimento abaixo da média`); }
  }

  // Trend dos últimos snapshots
  const prices = hist.slice(0, HIST_SHOW)
    .map(h => parseBR(h.preco_atual))
    .filter(p => p > 0);

  if (prices.length >= 2 && preco > 0) {
    const oldest = prices[prices.length - 1];
    const trend  = (preco - oldest) / oldest;
    if      (trend < -0.02) { score += 1; reasons.push('Preço em queda recente — possível oportunidade'); }
    else if (trend >  0.03) {             reasons.push('Preço em alta recente'); }
  }

  if (score >= 4) return { label:'Excelente para comprar', icon:'🟢', color:'#3fb950', bg:'rgba(63,185,80,0.12)',  reasons };
  if (score >= 2) return { label:'Bom para comprar',       icon:'🟡', color:'#d29922', bg:'rgba(210,153,34,0.12)', reasons };
  if (score >= 0) return { label:'Neutro — aguardar',      icon:'⚪', color:'#8b949e', bg:'rgba(139,148,158,0.12)',reasons };
  return               { label:'Avaliar com cuidado',      icon:'🔴', color:'#f85149', bg:'rgba(248,81,73,0.12)',  reasons };
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderCard(ticker) {
  const state = cardState[ticker] || 'idle';
  const hist  = (history[ticker] || []).slice(0, HIST_SHOW);
  const isRef = refreshing.has(ticker);

  // ── loading / idle ──
  if (state === 'loading' || state === 'idle') {
    return `<div class="card" id="card-${ticker}" draggable="true" data-ticker="${esc(ticker)}">
      <div class="c-head">
        <div><div class="c-ticker">${esc(ticker)}</div></div>
      </div>
      <div class="c-placeholder"><div class="spinner"></div><span>Consultando…</span></div>
    ${renderPortfolioFooter(ticker, null)}
  </div>`;
  }

  // ── error ──
  if (state === 'error') {
    return `<div class="card" id="card-${ticker}" draggable="true" data-ticker="${esc(ticker)}">
      <div class="c-head">
        <div><div class="c-ticker">${esc(ticker)}</div></div>
      </div>
      <div class="c-placeholder">
        <span class="c-error-icon">⚠️</span>
        <span>Não foi possível obter dados</span>
        <small>Verifique o ticker ou aguarde a próxima atualização</small>
      </div>
    ${renderPortfolioFooter(ticker, null)}
  </div>`;
  }

  // ── data ──
  const d      = state;
  const vc     = varClass(d.variacao_dia);
  const vi     = varIcon(d.variacao_dia);
  const signal = calcSignal(d, hist);
  const vpa    = d.dados_adicionais?.['Val. patrim. p/cota'] ?? '—';

  // History rows: show all HIST_SHOW entries newest-first
  const histRows = hist.length === 0
    ? `<div class="c-no-hist">Aguardando mais dados…</div>`
    : hist.map((h, i) => {
        const hvc = varClass(h.variacao_dia);
        const hvi = varIcon(h.variacao_dia);
        return `<div class="c-hist-row">
          <span class="c-hist-time">${fmtTime(h.consultado_em)}</span>
          <span class="c-hist-price">R$ ${esc(h.preco_atual ?? '—')}${i === 0 ? '<span class="c-hist-cur-label">agora</span>' : ''}</span>
          <span class="c-hist-var ${hvc}">${hvi} ${esc(h.variacao_dia ?? '—')}</span>
        </div>`;
      }).join('');

  return `<div class="card${isRef ? ' card-updating' : ''}" id="card-${ticker}" draggable="true" data-ticker="${esc(ticker)}">

    <div class="c-head">
      <div>
        <a class="c-ticker" href="${esc(d.fonte)}" target="_blank" rel="noopener noreferrer">${esc(d.ticker)}</a>
        <div class="c-nome">${esc(d.nome)}</div>
        ${isRef ? '<div class="c-refreshing-tag">atualizando…</div>' : ''}
      </div>
      ${d.segmento ? `<span class="c-badge" title="${esc(d.segmento)}">${esc(d.segmento)}</span>` : ''}
    </div>

    <div class="c-price">
      <div class="c-price-val"><span class="c-price-cur">R$</span>${esc(d.preco_atual ?? '—')}</div>
      <span class="c-var ${vc}">${vi} ${esc(d.variacao_dia ?? '—')}</span>
    </div>

    <div class="c-metrics">
      <div class="c-metric">
        <div class="c-metric-lbl">DY 12M</div>
        <div class="c-metric-val">${d.dy_12m ? esc(d.dy_12m) + '%' : '—'}</div>
      </div>
      <div class="c-metric">
        <div class="c-metric-lbl">P/VP</div>
        <div class="c-metric-val">${esc(d.pvp ?? '—')}</div>
      </div>
      <div class="c-metric">
        <div class="c-metric-lbl">Últ. Dividendo</div>
        <div class="c-metric-val">${d.ultimo_dividendo ? 'R$ ' + esc(d.ultimo_dividendo) : '—'}</div>
      </div>
      <div class="c-metric">
        <div class="c-metric-lbl">VPA</div>
        <div class="c-metric-val">${esc(vpa)}</div>
      </div>
    </div>

    <div class="c-hist">
      <div class="c-hist-title">Últimas ${HIST_SHOW} consultas</div>
      ${histRows}
    </div>

    <div class="c-signal">
      <div class="c-signal-badge" style="background:${signal.bg};border:1px solid ${signal.color}40">
        <span>${signal.icon}</span>
        <span class="c-signal-label" style="color:${signal.color}">${signal.label}</span>
      </div>
      <ul class="c-signal-reasons">
        ${signal.reasons.map(r => `<li>${esc(r)}</li>`).join('')}
      </ul>
    </div>
    ${renderPortfolioFooter(ticker, d)}
  </div>`;
}

function updatePortfolioTotal() {
  let total = 0;
  for (const ticker of cfg.fiis) {
    const cotas = portfolio[ticker] ?? 0;
    const data  = typeof cardState[ticker] === 'object' ? cardState[ticker] : null;
    total += cotas * parseBR(data?.ultimo_dividendo);
  }
  const el = document.getElementById('portfolio-total-badge');
  if (!el) return;
  if (total > 0) {
    el.textContent = `Carteira: R$ ${total.toFixed(2).replace('.', ',')} / mês`;
    el.classList.add('visible');
  } else {
    el.classList.remove('visible');
  }
}

function renderGrid() {
  const grid = document.getElementById('grid');
  if (cfg.fiis.length === 0) {
    grid.innerHTML = `<div class="empty">
      <h2>Nenhum FII configurado</h2>
      <p>Digite os tickers acima separados por vírgula para começar.</p>
    </div>`;
    updatePortfolioTotal();
    return;
  }
  grid.innerHTML = cfg.fiis.map(renderCard).join('');
  updatePortfolioTotal();
}

// ── Drag & drop reorder ────────────────────────────────────────────────────
let draggedTicker = null;
const grid = document.getElementById('grid');

grid.addEventListener('dragstart', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  draggedTicker = card.dataset.ticker;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', draggedTicker);
  setTimeout(() => card.classList.add('dragging'), 0);
});

grid.addEventListener('dragover', e => {
  if (!draggedTicker) return;
  e.preventDefault();
  const card = e.target.closest('.card');
  document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
  if (card && card.dataset.ticker !== draggedTicker) card.classList.add('drag-over');
});

grid.addEventListener('drop', e => {
  if (!draggedTicker) return;
  e.preventDefault();
  const card = e.target.closest('.card');
  document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));

  const targetTicker = card?.dataset.ticker;
  if (targetTicker !== draggedTicker) {
    const from = cfg.fiis.indexOf(draggedTicker);
    if (from !== -1) {
      const originalTargetIndex = targetTicker ? cfg.fiis.indexOf(targetTicker) : cfg.fiis.length;
      cfg.fiis.splice(from, 1);
      let to = targetTicker ? cfg.fiis.indexOf(targetTicker) : cfg.fiis.length;
      if (originalTargetIndex > from) to += 1; // moved forward: drop after the target
      cfg.fiis.splice(to, 0, draggedTicker);
      saveCfg();
      renderGrid();
    }
  }
  draggedTicker = null;
});

grid.addEventListener('dragend', () => {
  document.querySelectorAll('.card.dragging').forEach(c => c.classList.remove('dragging'));
  document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
  draggedTicker = null;
});

// ── Fetch ──────────────────────────────────────────────────────────────────
async function fetchOne(ticker) {
  const hasData = cardState[ticker] && cardState[ticker] !== 'loading'
                                    && cardState[ticker] !== 'error'
                                    && cardState[ticker] !== 'idle';

  if (!hasData) { cardState[ticker] = 'loading'; }
  else          { refreshing.add(ticker); }

  renderGrid();

  try {
    const res = await fetch(`/fii/${ticker}`);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    pushHistory(ticker, data);
    cardState[ticker] = data;
  } catch {
    if (!hasData) cardState[ticker] = 'error';
    // on refresh failure, keep showing existing data
  }

  refreshing.delete(ticker);
  renderGrid();
}

async function refreshAll() {
  document.getElementById('btn-refresh').disabled = true;
  await Promise.all(cfg.fiis.map(fetchOne));
  document.getElementById('last-updated').textContent =
    'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
  document.getElementById('btn-refresh').disabled = false;
}

// ── Timer ──────────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerId);
  countdown = cfg.intervalSec;
  timerId = setInterval(() => {
    countdown--;
    const el = document.getElementById('countdown');
    if (el) el.textContent = `Próxima atualização em ${countdown}s`;
    if (countdown <= 0) {
      countdown = cfg.intervalSec;
      refreshAll();
    }
  }, 1000);
}

// ── Controls ───────────────────────────────────────────────────────────────
document.getElementById('inp-fiis').addEventListener('change', e => {
  const next = e.target.value
    .split(',')
    .map(s => s.trim().toUpperCase())
    .filter(Boolean);

  // init state only for new tickers
  next.forEach(t => { if (!cardState[t]) cardState[t] = 'idle'; });

  cfg.fiis = next;
  saveCfg();
  renderGrid();
  refreshAll();
});

document.getElementById('inp-interval').addEventListener('change', e => {
  cfg.intervalSec = parseInt(e.target.value);
  saveCfg();
  startTimer();
});

document.getElementById('btn-refresh').addEventListener('click', () => {
  refreshAll();
  countdown = cfg.intervalSec;
});

// ── Portfolio ──────────────────────────────────────────────────────────────
let portfolio   = {};
let popupTicker = null;

async function loadPortfolio() {
  try {
    const res = await fetch('/api/portfolio');
    if (res.ok) portfolio = await res.json();
  } catch {}
}

function findPaymentDate(dados) {
  if (!dados?.dados_adicionais) return null;
  const key = Object.keys(dados.dados_adicionais)
    .find(k => /^data\s*(de\s*)?(pagamento|pgto)/i.test(k.trim()));
  return key ? dados.dados_adicionais[key] : null;
}

function renderPortfolioFooter(ticker, data) {
  const cotas      = portfolio[ticker] ?? 0;
  const divPerCota = parseBR(data?.ultimo_dividendo);
  const pgto       = findPaymentDate(data);
  const total      = divPerCota > 0 ? (cotas * divPerCota).toFixed(2).replace('.', ',') : null;

  const info = cotas === 0
    ? `<span class="c-portfolio-empty">Adicionar posição…</span>`
    : `<div class="c-portfolio-row">
        <span class="c-portfolio-cotas">${cotas} cotas</span>
        ${total !== null ? `<span class="c-portfolio-est">+ R$ ${total}</span>` : ''}
        ${pgto ? `<span class="c-portfolio-pgto">pgto ${esc(pgto)}</span>` : ''}
      </div>`;

  return `<div class="c-portfolio" onclick="openPortfolioPopup('${esc(ticker)}')">
    <div class="c-portfolio-info">
      <div class="c-portfolio-label">Carteira</div>
      ${info}
    </div>
    <span class="c-portfolio-pen">✏</span>
  </div>`;
}

function openPortfolioPopup(ticker) {
  popupTicker   = ticker;
  const data    = typeof cardState[ticker] === 'object' ? cardState[ticker] : null;
  document.getElementById('popup-ticker').textContent = ticker;
  document.getElementById('popup-nome').textContent   = data?.nome ?? '';
  document.getElementById('popup-input').value        = portfolio[ticker] ?? 0;
  updatePopupPreview();
  document.getElementById('popup-overlay').classList.add('open');
  setTimeout(() => {
    const inp = document.getElementById('popup-input');
    inp.focus();
    inp.select();
  }, 50);
}

function closePopup() {
  document.getElementById('popup-overlay').classList.remove('open');
  popupTicker = null;
}

function updatePopupPreview() {
  const data       = popupTicker && typeof cardState[popupTicker] === 'object' ? cardState[popupTicker] : null;
  const cotas      = parseInt(document.getElementById('popup-input').value) || 0;
  const divPerCota = parseBR(data?.ultimo_dividendo);
  const total      = divPerCota > 0 ? (cotas * divPerCota).toFixed(2).replace('.', ',') : null;
  const pgto       = findPaymentDate(data);

  document.getElementById('popup-preview').innerHTML = `
    <div class="popup-preview-row">
      <span class="popup-preview-lbl">Últ. dividendo / cota</span>
      <span class="popup-preview-val">${data?.ultimo_dividendo ? 'R$ ' + esc(data.ultimo_dividendo) : '—'}</span>
    </div>
    <div class="popup-preview-row">
      <span class="popup-preview-lbl">Estimativa mensal</span>
      <span class="popup-preview-val ${total !== null ? 'popup-preview-total' : ''}">${total !== null ? 'R$ ' + total : '—'}</span>
    </div>
    <div class="popup-preview-row">
      <span class="popup-preview-lbl">Data de pagamento</span>
      <span class="popup-preview-val">${pgto ? esc(pgto) : '—'}</span>
    </div>`;
}

function savePopupEntry() {
  if (!popupTicker) return;
  const cotas = Math.max(0, Math.min(9999, parseInt(document.getElementById('popup-input').value) || 0));
  portfolio[popupTicker] = cotas;
  fetch(`/api/portfolio/${encodeURIComponent(popupTicker)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cotas }),
  }).catch(() => {});
  closePopup();
  renderGrid();
}

document.getElementById('popup-cancel').addEventListener('click', closePopup);
document.getElementById('popup-save').addEventListener('click', savePopupEntry);
document.getElementById('popup-overlay').addEventListener('click', e => {
  if (e.target.id === 'popup-overlay') closePopup();
});
document.getElementById('popup-input').addEventListener('input', updatePopupPreview);
document.getElementById('popup-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') savePopupEntry();
  if (e.key === 'Escape') closePopup();
});

// ── Init ───────────────────────────────────────────────────────────────────
(async function init() {
  await Promise.all([loadCfg(), loadHistory(), loadPortfolio()]);

  document.getElementById('inp-fiis').value = cfg.fiis.join(', ');
  document.getElementById('inp-interval').value = String(cfg.intervalSec);

  cfg.fiis.forEach(t => {
    cardState[t] = (history[t] || [])[0] || 'idle';
  });

  renderGrid();
  startTimer();
  refreshAll();
})();
</script>
</body>
